<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction</title>
</head>
<body>

<h1>Diabetes Prediction</h1>

<form action="/predict_diabetes" method="POST">

    <label>Age:</label>
    <input type="number" name="age" required><br><br>

    <label>Glucose:</label>
    <input type="number" name="glucose" required><br><br>

    <label>Cholesterol:</label>
    <input type="number" name="chol" required><br><br>

    <label>HDL:</label>
    <input type="number" name="hdl" required><br><br>

    <label>Ratio:</label>
    <input type="number" step="0.01" name="ratio" required><br><br>

    <label>BMI:</label>
    <input type="number" step="0.01" name="bmi" required><br><br>

    <button type="submit">
        Predict
    </button>

</form>

</body>
</html>
